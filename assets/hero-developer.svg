<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <!-- Background Elements -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="url(#grad1)"/>
  
  <!-- Floating Code Elements -->
  <g opacity="0.6">
    <text x="80" y="80" font-family="'Courier New', monospace" font-size="14" fill="rgba(255,255,255,0.7)" opacity="0.8">
      &lt;html&gt;
      <animateTransform attributeName="transform" type="translate" values="0,0; 5,10; 0,0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="480" y="120" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.6)" opacity="0.7">
      function()
      <animateTransform attributeName="transform" type="translate" values="0,0; -8,5; 0,0" dur="5s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="400" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.8)" opacity="0.6">
      console.log()
      <animateTransform attributeName="transform" type="translate" values="0,0; 10,-5; 0,0" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Main Monitor/Laptop -->
  <g transform="translate(150, 150)">
    <!-- Laptop Base -->
    <ellipse cx="150" cy="280" rx="160" ry="20" fill="rgba(0,0,0,0.3)"/>
    <rect x="40" y="260" width="220" height="20" rx="10" fill="#2d3748"/>
    
    <!-- Laptop Screen -->
    <rect x="50" y="80" width="200" height="180" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="3"/>
    <rect x="60" y="90" width="180" height="140" rx="4" fill="url(#screenGrad)"/>
    
    <!-- Screen Content - Code Editor -->
    <rect x="65" y="95" width="170" height="20" fill="#374151"/>
    <circle cx="75" cy="105" r="3" fill="#ef4444"/>
    <circle cx="85" cy="105" r="3" fill="#f59e0b"/>
    <circle cx="95" cy="105" r="3" fill="#10b981"/>
    
    <!-- Code Lines with Animation -->
    <g>
      <rect x="70" y="125" width="60" height="2" fill="#6366f1" opacity="0.9">
        <animate attributeName="width" values="60;80;60" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="135" y="125" width="40" height="2" fill="#8b5cf6" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="70" y="135" width="90" height="2" fill="#10b981" opacity="0.9">
        <animate attributeName="width" values="90;110;90" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="165" y="135" width="50" height="2" fill="#f59e0b" opacity="0.8"/>
      
      <rect x="80" y="145" width="70" height="2" fill="#ec4899" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="155" y="145" width="60" height="2" fill="#06b6d4" opacity="0.8"/>
      
      <rect x="70" y="155" width="80" height="2" fill="#8b5cf6" opacity="0.9"/>
      <rect x="155" y="155" width="45" height="2" fill="#6366f1" opacity="0.8">
        <animate attributeName="width" values="45;65;45" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="80" y="165" width="100" height="2" fill="#10b981" opacity="0.9">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="70" y="175" width="65" height="2" fill="#f59e0b" opacity="0.9"/>
      <rect x="140" y="175" width="75" height="2" fill="#ec4899" opacity="0.8">
        <animate attributeName="width" values="75;95;75" dur="4s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="70" y="185" width="85" height="2" fill="#06b6d4" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="160" y="185" width="55" height="2" fill="#6366f1" opacity="0.8"/>
      
      <rect x="80" y="195" width="110" height="2" fill="#8b5cf6" opacity="0.9">
        <animate attributeName="width" values="110;130;110" dur="3s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="70" y="205" width="95" height="2" fill="#10b981" opacity="0.9"/>
      <rect x="170" y="205" width="45" height="2" fill="#f59e0b" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Cursor Blinking -->
    <rect x="190" y="205" width="2" height="8" fill="#ffffff" opacity="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Coffee Cup -->
  <g transform="translate(450, 320)">
    <ellipse cx="25" cy="45" rx="30" ry="8" fill="rgba(0,0,0,0.2)"/>
    <rect x="10" y="15" width="30" height="30" rx="4" fill="#8b4513"/>
    <rect x="12" y="17" width="26" height="26" rx="3" fill="#d2691e"/>
    <rect x="14" y="19" width="22" height="20" fill="#654321"/>
    <path d="M40 25 Q50 25 50 35 Q50 40 45 40" stroke="#8b4513" stroke-width="3" fill="none"/>
    <!-- Steam -->
    <g opacity="0.6">
      <path d="M20 10 Q22 5 20 0" stroke="rgba(255,255,255,0.8)" stroke-width="1" fill="none">
        <animate attributeName="d" values="M20 10 Q22 5 20 0;M20 10 Q18 5 20 0;M20 10 Q22 5 20 0" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M25 10 Q27 5 25 0" stroke="rgba(255,255,255,0.8)" stroke-width="1" fill="none">
        <animate attributeName="d" values="M25 10 Q27 5 25 0;M25 10 Q23 5 25 0;M25 10 Q27 5 25 0" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M30 10 Q32 5 30 0" stroke="rgba(255,255,255,0.8)" stroke-width="1" fill="none">
        <animate attributeName="d" values="M30 10 Q32 5 30 0;M30 10 Q28 5 30 0;M30 10 Q32 5 30 0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Floating Tech Icons -->
  <!-- React Atom -->
  <g transform="translate(100, 200)" opacity="0.7">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="3" fill="#61dafb"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(120)"/>
    </g>
  </g>
  
  <!-- JavaScript Logo -->
  <g transform="translate(480, 200)" opacity="0.8">
    <rect x="-15" y="-15" width="30" height="30" fill="#f7df1e" rx="4">
      <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#323330">JS</text>
  </g>
  
  <!-- Node.js -->
  <g transform="translate(120, 350)" opacity="0.7">
    <circle cx="0" cy="0" r="18" fill="#339933">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">NODE</text>
  </g>
  
  <!-- Git Branch -->
  <g transform="translate(500, 350)" opacity="0.6">
    <circle cx="0" cy="0" r="4" fill="#f05032"/>
    <circle cx="20" cy="10" r="4" fill="#f05032"/>
    <circle cx="20" cy="-10" r="4" fill="#f05032"/>
    <path d="M4 0 L16 10" stroke="#f05032" stroke-width="2"/>
    <path d="M4 0 L16 -10" stroke="#f05032" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- Binary Rain Effect -->
  <g opacity="0.3">
    <text x="50" y="150" font-family="'Courier New', monospace" font-size="12" fill="rgba(16, 185, 129, 0.8)">1010</text>
    <text x="520" y="280" font-family="'Courier New', monospace" font-size="12" fill="rgba(16, 185, 129, 0.6)">1100</text>
    <text x="80" y="320" font-family="'Courier New', monospace" font-size="12" fill="rgba(16, 185, 129, 0.7)">0110</text>
    <text x="450" y="180" font-family="'Courier New', monospace" font-size="12" fill="rgba(16, 185, 129, 0.5)">1001</text>
  </g>
  
  <!-- Geometric Decorations -->
  <g opacity="0.5">
    <polygon points="450,80 470,60 490,80 470,100" fill="rgba(99, 102, 241, 0.4)">
      <animateTransform attributeName="transform" type="rotate" values="0 470 80;360 470 80" dur="12s" repeatCount="indefinite"/>
    </polygon>
    
    <circle cx="150" cy="100" r="8" fill="rgba(245, 158, 11, 0.4)">
      <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <rect x="500" y="120" width="16" height="16" fill="rgba(139, 92, 246, 0.4)" transform="rotate(45 508 128)">
      <animateTransform attributeName="transform" type="rotate" values="45 508 128;405 508 128" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Connecting Lines -->
  <g opacity="0.3">
    <line x1="100" y1="200" x2="300" y2="250" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="480" y1="200" x2="400" y2="300" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;6" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>