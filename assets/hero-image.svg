<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <!-- Background Elements -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#grad1)"/>
  
  <!-- Floating Elements -->
  <circle cx="100" cy="80" r="20" fill="rgba(255,255,255,0.1)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,5; 0,0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="100" r="15" fill="rgba(255,255,255,0.1)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0; -8,10; 0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="300" r="25" fill="rgba(255,255,255,0.08)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,-8; 0,0" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Code Editor Window -->
  <rect x="120" y="120" width="260" height="200" rx="10" fill="#1f2937" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Editor Header -->
  <rect x="120" y="120" width="260" height="30" rx="10" fill="#374151"/>
  <rect x="120" y="140" width="260" height="10" rx="0" fill="#374151"/>
  
  <!-- Traffic Light Buttons -->
  <circle cx="135" cy="135" r="5" fill="#ef4444"/>
  <circle cx="150" cy="135" r="5" fill="#f59e0b"/>
  <circle cx="165" cy="135" r="5" fill="#10b981"/>
  
  <!-- Code Lines -->
  <rect x="135" y="165" width="80" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="220" y="165" width="60" height="3" fill="#8b5cf6" opacity="0.8"/>
  <rect x="290" y="165" width="40" height="3" fill="#06b6d4" opacity="0.8"/>
  
  <rect x="135" y="180" width="120" height="3" fill="#10b981" opacity="0.8"/>
  <rect x="260" y="180" width="80" height="3" fill="#f59e0b" opacity="0.8"/>
  
  <rect x="155" y="195" width="90" height="3" fill="#ec4899" opacity="0.8"/>
  <rect x="250" y="195" width="70" height="3" fill="#6366f1" opacity="0.8"/>
  
  <rect x="135" y="210" width="100" height="3" fill="#8b5cf6" opacity="0.8"/>
  <rect x="240" y="210" width="50" height="3" fill="#06b6d4" opacity="0.8"/>
  
  <rect x="155" y="225" width="130" height="3" fill="#10b981" opacity="0.8"/>
  
  <rect x="135" y="240" width="85" height="3" fill="#f59e0b" opacity="0.8"/>
  <rect x="225" y="240" width="95" height="3" fill="#ec4899" opacity="0.8"/>
  
  <rect x="135" y="255" width="110" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="250" y="255" width="60" height="3" fill="#8b5cf6" opacity="0.8"/>
  
  <rect x="155" y="270" width="80" height="3" fill="#06b6d4" opacity="0.8"/>
  <rect x="240" y="270" width="70" height="3" fill="#10b981" opacity="0.8"/>
  
  <rect x="135" y="285" width="140" height="3" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Developer Character -->
  <!-- Head -->
  <circle cx="280" cy="90" r="25" fill="#fbbf24"/>
  
  <!-- Hair -->
  <path d="M255 75 Q280 60 305 75 Q300 65 280 65 Q260 65 255 75" fill="#374151"/>
  
  <!-- Eyes -->
  <circle cx="272" cy="85" r="3" fill="#1f2937"/>
  <circle cx="288" cy="85" r="3" fill="#1f2937"/>
  
  <!-- Smile -->
  <path d="M270 95 Q280 100 290 95" stroke="#1f2937" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="265" y="115" width="30" height="40" fill="#6366f1" rx="5"/>
  
  <!-- Arms -->
  <rect x="245" y="125" width="20" height="8" fill="#fbbf24" rx="4"/>
  <rect x="295" y="125" width="20" height="8" fill="#fbbf24" rx="4"/>
  
  <!-- Hands on keyboard -->
  <circle cx="240" cy="129" r="4" fill="#fbbf24"/>
  <circle cx="320" cy="129" r="4" fill="#fbbf24"/>
  
  <!-- Keyboard -->
  <rect x="220" y="125" width="120" height="15" fill="#374151" rx="3"/>
  <rect x="225" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="235" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="245" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="255" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="265" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="275" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="285" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="295" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="305" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="315" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  <rect x="325" y="128" width="8" height="4" fill="#6b7280" rx="1"/>
  
  <!-- Tech Icons -->
  <!-- React Icon -->
  <g transform="translate(50, 250)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#61dafb" stroke-width="2" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#61dafb" stroke-width="2" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#61dafb" stroke-width="2" opacity="0.8" transform="rotate(60)">
      <animateTransform attributeName="transform" type="rotate" values="60;420" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#61dafb" stroke-width="2" opacity="0.8" transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" values="120;480" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="0" r="3" fill="#61dafb"/>
  </g>
  
  <!-- JavaScript Icon -->
  <rect x="400" y="200" width="30" height="30" fill="#f7df1e" rx="3" opacity="0.8">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="415" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#323330">JS</text>
  
  <!-- CSS Icon -->
  <rect x="80" y="350" width="25" height="30" fill="#1572b6" rx="2" opacity="0.8">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="92.5" y="370" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">CSS</text>
  
  <!-- HTML Icon -->
  <rect x="420" y="340" width="25" height="30" fill="#e34f26" rx="2" opacity="0.8">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="432.5" y="360" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">HTML</text>
  
  <!-- Geometric Shapes -->
  <polygon points="150,50 170,30 190,50 170,70" fill="rgba(99, 102, 241, 0.3)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" values="0 170 50;360 170 50" dur="10s" repeatCount="indefinite"/>
  </polygon>
  
  <rect x="350" y="40" width="20" height="20" fill="rgba(245, 158, 11, 0.3)" opacity="0.6" transform="rotate(45 360 50)">
    <animateTransform attributeName="transform" type="rotate" values="45 360 50;405 360 50" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Decorative Lines -->
  <line x1="30" y1="150" x2="80" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="2" opacity="0.5"/>
  <line x1="430" y1="160" x2="480" y2="190" stroke="rgba(255,255,255,0.2)" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="320" x2="100" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="2" opacity="0.5"/>
</svg>